<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>点击展示广告｜页面内收益版</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background:#000;
            min-height:100vh;
            color:#fff;
            font-family:Arial,sans-serif;
            text-align:center;
            padding:15px;
        }
        /* 广告容器：默认隐藏 */
        .ad-box{
            width:100%;
            min-height:70px;
            margin:20px 0;
            border:1px solid #222;
            border-radius:8px;
            display:none;
            align-items:center;
            justify-content:center;
            overflow:hidden;
        }
        .ad-box iframe{
            border:none;
            width:100%;
            max-width:100%;
        }
        .count-down{
            font-size:24px;
            color:#4cd964;
            margin:30px 0;
            font-weight:bold;
        }
        .text-info{
            color:#999;
            font-size:14px;
            line-height:1.8;
        }
        .state{
            margin-top:15px;
            font-size:13px;
            color:#ccc;
        }
        /* 点击按钮样式 */
        .btn-show-ad{
            margin:30px auto;
            padding:14px 30px;
            font-size:16px;
            font-weight:bold;
            background:#4cd964;
            color:#000;
            border:none;
            border-radius:8px;
            cursor:pointer;
            transition:0.2s;
        }
        .btn-show-ad:disabled{
            background:#333;
            color:#777;
            cursor:not-allowed;
        }
    </style>
</head>
<body>

    <button class="btn-show-ad" id="showAdBtn">点击此处 展示广告获取收益</button>

    <!-- 广告区域 默认隐藏 点击后显示 -->
    <div class="ad-box" id="adContainer">
        <script>
            atOptions = {
                'key' : 'f44ac887ae0ad661a2c851e5042f8ad2',
                'format' : 'iframe',
                'height' : 60,
                'width' : 100,
                'params' : {}
            };
        </script>
        <script src="https://www.highperformanceformat.com/f44ac887ae0ad661a2c851e5042f8ad2/invoke.js"></script>
    </div>

    <div class="count-down">
        剩余挂机时间：<span id="timeShow">900</span> 秒
    </div>

    <div class="text-info">
        <p>✅ 纯页面内点击展示广告</p>
        <p>✅ 无自动加载｜低拦截更安全</p>
        <p>✅ 后台计时不中断、不重置</p>
    </div>
    <div class="state" id="adState">等待手动开启广告</div>

<script>
// 基础配置
const RELOAD_SECOND = 900;
const startTimestamp = Date.now();
let timer = null;
let isAdLoaded = false;

// 精准倒计时逻辑（后台不掉时）
function refreshTime(){
    let pass = Math.floor((Date.now() - startTimestamp) / 1000);
    let remain = RELOAD_SECOND - pass;
    remain = Math.max(0, remain);
    document.getElementById("timeShow").innerText = remain;
    if(remain <= 0){
        window.location.reload();
    }
}
function startTimer(){
    clearInterval(timer);
    timer = setInterval(refreshTime, 1000);
}
startTimer();
refreshTime();

// 前后台切换 时间同步
document.addEventListener("visibilitychange", function(){
    if(!document.hidden){
        refreshTime();
        startTimer();
        document.title = "挂机正常运行中";
    }else{
        document.title = "后台挂起中...";
    }
});

// ========== 核心：页面内点击展示广告 ==========
document.getElementById("showAdBtn").addEventListener("click", function(){
    if(isAdLoaded) return;
    isAdLoaded = true;

    // 1. 显示广告盒子
    document.getElementById("adContainer").style.display = "flex";
    // 2. 按钮禁用防止重复点击
    this.innerText = "广告已开启";
    this.disabled = true;

    // 3. 延迟加载第二条广告（不抢主广告资源）
    setTimeout(()=>{
        let script = document.createElement("script");
        script.src = "https://pl29329637.profitablecpmratenetwork.com/23/e6/0f/23e60f188dd4875e6ebdd15317925bc1.js";
        script.onerror = ()=>{};
        document.body.appendChild(script);
    }, 3500);

    // 4. 智能广告状态检测
    setTimeout(()=>{
        const iframe = document.querySelector(".ad-box iframe");
        const tip = document.getElementById("adState");
        try{
            const st = getComputedStyle(iframe);
            if(st.display === "none" || st.visibility === "hidden" || Number(st.opacity) < 0.2){
                tip.innerText = "❌ 广告被浏览器拦截";
                tip.style.color = "#ff5555";
            }else{
                tip.innerText = "✅ 页面内广告正常展示，收益中";
                tip.style.color = "#4cd964";
            }
        }catch(e){
            tip.innerText = "⚠️ 广告跨域正常展示";
            tip.style.color = "#ffaa00";
        }
    }, 2800);
});

// 视频广告自动静音
document.addEventListener("DOMContentLoaded",()=>{
    document.querySelectorAll("video").forEach(v=>{
        v.muted = true;
        v.volume = 0;
        v.autoplay = true;
        v.loop = true;
    });
});
</script>

</body>
</html>
