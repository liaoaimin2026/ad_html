<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>夸克优化版-手机H5挂机</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background:#000;
            min-height:100vh;
            color:#fff;
            font-family:system-ui,"Microsoft Yahei",sans-serif;
            text-align:center;
            padding:15px;
            overflow-x:hidden;
        }
        .ad-top{
            width:100%;
            display:flex;
            align-items:center;
            justify-content:center;
            margin:20px 0;
            min-height:60px;
            border:1px solid #222;
        }
        .ad-top iframe{
            border:none;
            width:100%;
            max-width:100%;
        }
        .content{
            padding:30px 15px;
            color:#ccc;
            font-size:15px;
            line-height:1.8;
        }
        .count-box{
            font-size:22px;
            color:#42b983;
            margin:25px 0;
            font-weight:bold;
        }
        .tips{
            color:#666;
            font-size:12px;
            position:fixed;
            bottom:20px;
            left:0;
            width:100%;
        }
        h3{
            font-size:18px;
            margin-bottom:10px;
        }
        .ad-status{
            font-size:13px;
            color:#aaa;
            margin-top:10px;
        }
    </style>
</head>
<body>

    <div class="ad-top">
        <script>
          atOptions = {
            'key' : 'f44ac887ae0ad661a2c851e5042f8ad2',
            'format' : 'iframe',
            'height' : 60,
            'width' : 468,
            'params' : {}
          };
        </script>
        <script src="https://www.highperformanceformat.com/f44ac887ae0ad661a2c851e5042f8ad2/invoke.js"></script>
    </div>

    <div class="content">
        <h3>📱 夸克优化版-挂机中</h3>
        <div class="count-box">剩余时间：<span id="countdown"></span> 秒</div>
        <p>自动静音广告视频 | 增强后台保活</p>
        <p>已优化广告加载逻辑，减少拦截</p>
        <div class="ad-status" id="adStatus">广告加载状态：检测中...</div>
    </div>

    <div class="tips">请保持页面前台亮屏运行，后台可能被系统限制</div>

<script>
// ========== 自定义配置 ==========
const stayTime = 900; // 15分钟自动刷新
let startTime = Date.now();
let leftTime = stayTime;

// 1. 更稳定的倒计时（基于时间戳校准，防止后台冻结）
function updateCountdown() {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    leftTime = stayTime - elapsed;
    if (leftTime <= 0) {
        window.location.reload();
    }
    document.getElementById("countdown").innerText = leftTime;
}
// 每秒更新倒计时
setInterval(updateCountdown, 1000);

// 2. 后台保活+时间校准
document.addEventListener('visibilitychange', function(){
    document.title = document.hidden ? "挂机保活中…" : "夸克优化版-手机H5挂机";
    // 切回前台立刻校准时间
    if(!document.hidden){
        startTime = Date.now();
        updateCountdown();
    }
});

// 3. 广告加载状态检测
setTimeout(() => {
    const iframe = document.querySelector('.ad-top iframe');
    const statusEl = document.getElementById('adStatus');
    if(iframe && iframe.contentDocument && iframe.contentDocument.body.innerHTML.trim() !== ''){
        statusEl.innerText = "广告加载状态：✅ 正常";
        statusEl.style.color = "#42b983";
    } else {
        statusEl.innerText = "广告加载状态：❌ 未加载，建议刷新或检查拦截设置";
        statusEl.style.color = "#ff6b6b";
    }
}, 3000);

// 4. 视频广告强制静音+自动播放
document.addEventListener('DOMContentLoaded', function(){
    let allVideo = document.querySelectorAll('video');
    allVideo.forEach(vid=>{
        vid.muted = true;
        vid.autoplay = true;
        vid.loop = true;
        vid.volume = 0;
    });
});

// 5. 禁用右键、限制频繁刷新
document.oncontextmenu = function(){return false;};
let lastRefreshTime = 0;
document.addEventListener('keydown',function(e){
    if(e.key === 'F5'){
        let now = Date.now();
        if(now - lastRefreshTime < 5000){
            e.preventDefault();
            return false;
        }
        lastRefreshTime = now;
    }
});
</script>

<!-- 底部广告，保留但优化加载时机 -->
<script>
// 延迟加载弹窗广告，避免一开始就被拦截
setTimeout(() => {
    const script = document.createElement('script');
    script.src = "https://pl29329637.profitablecpmratenetwork.com/23/e6/0f/23e60f188dd4875e6ebdd15317925bc1.js";
    document.body.appendChild(script);
}, 5000);
</script>

</body>
</html>
