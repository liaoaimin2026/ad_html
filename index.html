        <script>

    <div class="content">
        <h3>📱 手机H5挂机【后台保活增强】</h3>
        <div class="count-box">剩余时间：<span id="countdown"></span> 秒</div>
        <p>自动静音广告视频</p>
        <p>增强后台保活，尽量不暂停</p>
        <p>安卓后台稳 · iPhone建议前台挂</p>
    </div>

    <div class="tips">手机专用H5 · 后台保活模式已开启</div>

<script>
// 自定义刷新秒数
const stayTime = 900;
let leftTime = stayTime;

// 倒计时显示
let timer = setInterval(()=>{
    leftTime--;
    document.getElementById("countdown").innerText = leftTime;
},1000);

// 定时刷新
function reloadPage(){
    window.location.reload();
}
let reloadTimer = setTimeout(reloadPage, stayTime * 1000);

// ========== 后台保活核心代码 ==========
// 利用空白请求+心跳唤醒，减少后台冻结
setInterval(function(){
    // 空请求保活
    fetch('data:text/plain;charset=utf-8,keepalive',{cache:'no-cache'})
    .catch(e=>{});
    // 同步校准倒计时
    if(leftTime <= 0){
        reloadPage();
    }
},3000);

// 页面切回来立刻校准时间
document.addEventListener('visibilitychange', function(){
    document.title = document.hidden ? "挂机保活中…" : "手机H5广告挂机";
    // 切回前台重置定时器
    if(!document.hidden){
        clearTimeout(reloadTimer);
        reloadTimer = setTimeout(reloadPage, leftTime * 1000);
    }
});
// ====================================

// 视频静音处理
document.addEventListener('DOMContentLoaded', function(){
    let allVideo = document.querySelectorAll('video');
    allVideo.forEach(vid=>{
        vid.muted = true;
        vid.autoplay = true;
        vid.loop = true;
        vid.volume = 0;
    });
});

// 禁用右键、防刷新
document.oncontextmenu = function(){return false;};
let lastRefreshTime = 0;
document.addEventListener('keydown',function(e){
    if(e.key === 'F5'){
        let now = Date.now();
        if(now - lastRefreshTime < 5000){
            e.preventDefault();
            return false;
        }
        lastRefreshTime = now;
    }
});
</script>
