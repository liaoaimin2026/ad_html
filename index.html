        .content{
            padding:20px;

        }
        .tips{
            color:#666;
            font-size:12px;

        }
    </style>
</head>
<body>

    <!-- 顶部 Banner 广告位：已嵌入你的代码 -->

        <script>
          atOptions = {

        <p>页面每15分钟自动刷新一次，以获取最新广告</p>

    <!-- 底部广告位：可后续添加第二个平台广告 -->

    <div class="tips">合规挂机 · 请勿点击广告 · 请勿频繁刷新</div>

<script>
// 1. 合规自动刷新：15分钟（900秒）
const reloadTime = 900;
setTimeout(function(){
    window.location.reload();
}, reloadTime * 1000);

// 2. 统一静音自动播放视频广告，提升填充率
document.addEventListener('DOMContentLoaded', function(){
    let allVideo = document.querySelectorAll('video');
    allVideo.forEach(vid=>{
        vid.muted = true;
        vid.autoplay = true;
        vid.loop = true;
    });
});

// 3. 限制手动刷新频率，降低风控嫌疑
let lastRefreshTime = 0;
document.addEventListener('keydown',function(e){
    if(e.key === 'F5'){
        let now = Date.now();
        if(now - lastRefreshTime < 3000){
            e.preventDefault();
            return false;
        }
        lastRefreshTime = now;
    }
});
</script>
