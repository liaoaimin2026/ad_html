<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>稳定版广告挂机-修复倒计时不重置</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background:#000;
            min-height:100vh;
            color:#fff;
            font-family:Arial,sans-serif;
            text-align:center;
            padding:15px;
        }
        .ad-box{
            width:100%;
            min-height:70px;
            margin:20px 0;
            border:1px solid #222;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .ad-box iframe{
            border:none;
            width:100%;
        }
        .count-down{
            font-size:24px;
            color:#4cd964;
            margin:30px 0;
            font-weight:bold;
        }
        .text-info{
            color:#999;
            font-size:14px;
            line-height:1.8;
        }
        .state{
            margin-top:15px;
            font-size:13px;
            color:#ccc;
        }
    </style>
</head>
<body>

    <!-- 顶部Banner广告 优先加载 -->
    <div class="ad-box">
        <script>
            atOptions = {
                'key' : 'f44ac887ae0ad661a2c851e5042f8ad2',
                'format' : 'iframe',
                'height' : 60,
                'width' : 468,
                'params' : {}
            };
        </script>
        <script src="https://www.highperformanceformat.com/f44ac887ae0ad661a2c851e5042f8ad2/invoke.js"></script>
    </div>

    <div class="count-down">
        剩余挂机时间：<span id="timeShow">900</span> 秒
    </div>

    <div class="text-info">
        <p>✅ 修复：切后台不重置倒计时</p>
        <p>✅ 时间戳精准累计计时</p>
        <p>✅ 前台后台时间统一不回退</p>
    </div>
    <div class="state" id="adState">广告检测中...</div>

<script>
// 配置：15分钟刷新 可自行修改
const RELOAD_SECOND = 900;
// 【核心修复】页面一打开就固定初始时间，永远不重置
const startTimestamp = Date.now();

// 精准计时：只计算流逝时间，不重置起点
function refreshTime(){
    let pass = Math.floor((Date.now() - startTimestamp) / 1000);
    let remain = RELOAD_SECOND - pass;

    if(remain < 0) remain = 0;
    document.getElementById("timeShow").innerText = remain;

    if(remain <= 0){
        window.location.reload();
    }
}

setInterval(refreshTime, 1000);
refreshTime();

// 切前台只刷新显示，不重置起始时间【关键修复】
document.addEventListener("visibilitychange", function(){
    if(!document.hidden){
        refreshTime();
        document.title = "挂机正常运行中";
    }else{
        document.title = "后台挂起中...";
    }
});

// 广告状态检测
setTimeout(()=>{
    let iframe = document.querySelector(".ad-box iframe");
    let tip = document.getElementById("adState");
    if(iframe){
        tip.innerText = "✅ Banner广告正常加载";
        tip.style.color = "#4cd964";
    }else{
        tip.innerText = "❌ 广告被拦截，请关闭广告过滤";
        tip.style.color = "#ff5555";
    }
},2500);

// 全部视频广告强制静音
document.addEventListener("DOMContentLoaded",()=>{
    document.querySelectorAll("video").forEach(v=>{
        v.muted = true;
        v.volume = 0;
        v.autoplay = true;
        v.loop = true;
    });
});

// 延迟加载底部弹窗广告
setTimeout(()=>{
    let s = document.createElement("script");
    s.src = "https://pl29329637.profitablecpmratenetwork.com/23/e6/0f/23e60f188dd4875e6ebdd15317925bc1.js";
    document.body.appendChild(s);
},8000);

// 禁用右键
document.oncontextmenu = ()=>false;
</script>

</body>
</html>
